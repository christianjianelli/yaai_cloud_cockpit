      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: abap-cloud-default_abap-trial-a3ca07edtrial-dev
          url: https://6da5c376-cfa8-4af4-913f-2061aa8356c8.abap.ap21.hana.ondemand.com/
          scp: true
        app:
          name: YAAIC_COCKPIT
          description: ABAP AI tools Cloud Cockpit
          package: YAAI_CLOUD_COCKPIT
          transport: ''
        exclude:
          - /test/
